<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProductivityPulse</title>
  <style>
    /* ── Reset & Tokens ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --accent:    #6366f1;
      --radius:    10px;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 14px;
    }

    .header-actions { display: flex; gap: 6px; }

    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 11px;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--accent); }

    /* ── Active site banner ───────────────────────────── */
    .active-site {
      margin: 12px 16px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .active-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 1.5s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .active-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .active-domain { font-weight: 600; font-size: 13px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .cat-badge {
      margin-left: auto;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Score ring ───────────────────────────────────── */
    .score-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 12px 16px;
    }

    .ring-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
    .ring-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .ring-pct { font-size: 22px; font-weight: 800; line-height: 1; }
    .ring-sub { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }

    /* ── Stat pills ───────────────────────────────────── */
    .stats-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-name { color: var(--muted); font-size: 11px; flex: 1; }
    .stat-val  { font-weight: 700; font-size: 13px; }

    /* ── Goal bar ─────────────────────────────────────── */
    .goal-section {
      padding: 0 16px 12px;
    }

    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .goal-val { color: var(--text); font-weight: 600; }

    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 10px;
      transition: width 0.8s ease;
    }

    /* ── Top sites ────────────────────────────────────── */
    .sites-section {
      border-top: 1px solid var(--border);
      padding: 10px 16px 14px;
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .site-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
    }

    .site-favicon {
      width: 16px; height: 16px;
      border-radius: 3px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .site-name { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .site-time { font-size: 12px; font-weight: 600; color: var(--muted); }

    .site-bar-wrap {
      width: 50px;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .site-bar { height: 100%; border-radius: 4px; }

    /* ── Footer ───────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-dashboard {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-dashboard:hover { opacity: 0.85; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 10px 0;
      font-size: 12px;
    }

    #loading {
      text-align: center;
      padding: 30px 0;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────── -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      ProductivityPulse
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="refreshBtn" title="Refresh">↻</button>
    </div>
  </div>

  <div id="loading">Loading stats…</div>

  <!-- ── Main content (hidden until data loads) ─────── -->
  <div id="mainContent" style="display:none">

    <!-- Active site -->
    <div class="active-site">
      <div class="active-dot"></div>
      <div style="flex:1;min-width:0">
        <div class="active-label">Tracking now</div>
        <div class="active-domain" id="activeDomain">—</div>
      </div>
      <div class="cat-badge" id="activeBadge">—</div>
    </div>

    <!-- Score ring + stats -->
    <div class="score-section">
      <div class="ring-wrap">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle class="ring-bg" cx="45" cy="45" r="38"/>
          <circle class="ring-fill" id="ringFill"
                  cx="45" cy="45" r="38"
                  stroke-dasharray="238.76"
                  stroke-dashoffset="238.76"/>
        </svg>
        <div class="ring-label">
          <div class="ring-pct" id="scoreVal">0%</div>
          <div class="ring-sub">score</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-row">
          <div class="stat-dot" style="background:#22c55e"></div>
          <div class="stat-name">Productive</div>
          <div class="stat-val" id="prodTime">0m</div>
        </div>
        <div class="stat-row">
          <div class="stat-dot" style="background:#ef4444"></div>
          <div class="stat-name">Distracting</div>
          <div class="stat-val" id="unproTime">0m</div>
        </div>
        <div class="stat-row">
          <div class="stat-dot" style="background:#f59e0b"></div>
          <div class="stat-name">Neutral</div>
          <div class="stat-val" id="neutTime">0m</div>
        </div>
        <div class="stat-row">
          <div class="stat-dot" style="background:#6366f1"></div>
          <div class="stat-name">Total tracked</div>
          <div class="stat-val" id="totalTime">0m</div>
        </div>
      </div>
    </div>

    <!-- Goal progress bar -->
    <div class="goal-section">
      <div class="goal-header">
        <span>Daily goal progress</span>
        <span class="goal-val" id="goalLabel">0 / 240 min</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="goalBar" style="width:0%"></div>
      </div>
    </div>

    <!-- Top 5 sites today -->
    <div class="sites-section">
      <div class="section-title">Top sites today</div>
      <div id="sitesList"></div>
    </div>

  </div><!-- /#mainContent -->

  <!-- ── Footer ─────────────────────────────────────── -->
  <div class="footer">
    <button class="btn-dashboard" id="dashBtn">Full Analytics →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
